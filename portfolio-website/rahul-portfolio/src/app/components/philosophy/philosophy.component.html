<section
  id="philosophy"
  class="py-24 md:py-32"
  style="background: var(--paper-warm)"
>
  <div class="max-w-[1400px] mx-auto px-6 md:px-12">
    <!-- Section header -->
    <div class="philosophy-header mb-16">
      <span class="eyebrow">04 / Philosophy</span>
      <h2
        class="font-display mt-4"
        style="
          font-family: 'Archivo Black', sans-serif;
          font-size: clamp(2.5rem, 5vw, 4rem);
          color: var(--ink);
          line-height: 1;
        "
      >
        How I Think About Work
      </h2>
    </div>

    <!-- Beliefs list -->
    <div>
      <div
        *ngFor="let belief of beliefs; let last = last"
        class="belief-row group"
        style="
          border-top: 1px solid var(--border);
          padding: 2rem 0;
          cursor: default;
          transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        "
        onmouseover="this.style.background='oklch(0.97 0.01 75)';this.querySelector('.belief-number').style.color='var(--ember)';this.querySelector('.belief-text').style.color='var(--ember)'"
        onmouseout="this.style.background='transparent';this.querySelector('.belief-number').style.color='oklch(0.8 0.01 70)';this.querySelector('.belief-text').style.color='var(--ink)'"
      >
        <div
          class="grid grid-cols-[80px_1fr] md:grid-cols-[120px_1fr] items-center gap-6 px-2"
        >
          <!-- Number -->
          <div
            class="belief-number font-mono"
            style="
              font-family: 'JetBrains Mono', monospace;
              font-size: 0.8rem;
              color: oklch(0.8 0.01 70);
              letter-spacing: 0.1em;
              transition: color 0.3s ease;
              flex-shrink: 0;
            "
          >
            {{ belief.number }}
          </div>

          <!-- Statement -->
          <div class="flex flex-col md:flex-row md:items-baseline gap-1 md:gap-6">
            <h3
              class="belief-text font-display"
              style="
                font-family: 'Archivo Black', sans-serif;
                font-size: clamp(1.4rem, 2.5vw, 2rem);
                color: var(--ink);
                line-height: 1.1;
                transition: color 0.3s ease;
              "
            >
              {{ belief.statement }}
            </h3>
            <span
              class="text-sm leading-relaxed"
              style="color: var(--ink-soft)"
            >
              {{ belief.sub }}
            </span>
          </div>
        </div>
      </div>

      <!-- Final border -->
      <div style="border-top: 1px solid var(--border)"></div>
    </div>
  </div>
</section>
