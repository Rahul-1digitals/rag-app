<footer
  class="py-8"
  style="
    background: var(--ink);
    border-top: 1px solid oklch(0.22 0.01 60);
  "
>
  <div
    class="max-w-[1400px] mx-auto px-4 md:px-6 xl:px-12 flex flex-col md:flex-row items-center justify-between gap-4"
  >
    <!-- Left -->
    <div
      class="eyebrow"
      style="color: oklch(0.4 0.01 60)"
    >
      © {{ currentYear }} Siripuram Rahul
    </div>

    <!-- Center: nav links -->
    <div class="flex items-center gap-6">
      <a
        href="#work"
        class="eyebrow"
        style="color: oklch(0.4 0.01 60); text-decoration: none; transition: color 0.2s ease"
        onmouseover="this.style.color='var(--paper)'"
        onmouseout="this.style.color='oklch(0.4 0.01 60)'"
        >Work</a
      >
      <a
        href="#ai"
        class="eyebrow"
        style="color: oklch(0.4 0.01 60); text-decoration: none; transition: color 0.2s ease"
        onmouseover="this.style.color='var(--paper)'"
        onmouseout="this.style.color='oklch(0.4 0.01 60)'"
        >AI Systems</a
      >
      <a
        href="#contact"
        class="eyebrow"
        style="color: oklch(0.4 0.01 60); text-decoration: none; transition: color 0.2s ease"
        onmouseover="this.style.color='var(--paper)'"
        onmouseout="this.style.color='oklch(0.4 0.01 60)'"
        >Contact</a
      >
    </div>

    <!-- Right -->
    <div
      class="eyebrow"
      style="color: oklch(0.4 0.01 60)"
    >
      Designed &amp; Built with Angular
    </div>
  </div>
</footer>
