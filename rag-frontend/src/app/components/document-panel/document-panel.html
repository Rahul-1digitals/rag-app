<div class="doc-panel">
  <div class="doc-header">
    <div class="header-top">
      <span class="header-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
      </span>
      <span class="header-title">Knowledge Base</span>
      <button class="icon-btn" (click)="layout.toggleSidebar()" title="Close sidebar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="search-box">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input
        type="text"
        placeholder="Search documents..."
        [ngModel]="searchQuery()"
        (ngModelChange)="searchQuery.set($event)"
      />
    </div>
  </div>

  <div class="doc-list">
    @if (filteredDocuments().length === 0) {
      <p class="empty-search">No documents match your search.</p>
    }
    @for (item of filteredDocuments(); track item.id) {
      <div class="doc-card" [class.selected]="item.isSelected" (click)="toggleDocumentSelection(item)">
        <div class="doc-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14,2 14,8 20,8"/>
          </svg>
        </div>
        <span class="doc-name">{{ item.name }}</span>
        @if (item.isSelected) {
          <span class="check-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="20,6 9,17 4,12"/>
            </svg>
          </span>
        }
      </div>
    }
  </div>

  <div class="doc-footer">
    @if (selectedCount > 0) {
      <p class="selection-count">{{ selectedCount }} document{{ selectedCount > 1 ? 's' : '' }} selected</p>
    }
    <button class="start-btn" [disabled]="!hasSelection" (click)="startChat()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      Start Chat
    </button>
  </div>
</div>
